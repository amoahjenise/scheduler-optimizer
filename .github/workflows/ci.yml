name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run lightweight backend tests (no heavy deps)
        run: |
          if [ -f backend/tests/test_scheduler_targets_mocked.py ]; then \
            python -m pip install --upgrade pip pytest >/dev/null 2>&1 || true; \
            pytest -q backend/tests/test_scheduler_targets_mocked.py || (echo "Lightweight backend tests failed" && exit 1); \
          else \
            echo "No lightweight backend tests found"; \
          fi

      - name: Install backend requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      - name: Run backend tests
        run: |
          if [ -d backend/tests ]; then pytest -q backend/tests || (echo "Backend tests failed" && exit 1); else echo "No backend tests found"; fi

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "18"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install frontend dependencies
        run: |
          if [ -f frontend/package.json ]; then cd frontend && npm ci; fi

      - name: Run frontend typecheck
        run: |
          if [ -f frontend/tsconfig.json ]; then cd frontend && npx tsc --noEmit; else echo "No frontend TypeScript config found"; fi
